# TellDNS Default Configuration

# Scan settings
concurrency: 500
timeout: 3.0
stealth: false

# DNS resolvers
resolvers:
  - 8.8.8.8
  - 8.8.4.4
  - 1.1.1.1
  - 1.0.0.1
  - 9.9.9.9
  - 208.67.222.222
  - 208.67.220.220

# Passive sources
passive_sources:
  crtsh: true
  alienvault: true
  rapiddns: true
  wayback: true
  dnsdumpster: true

# Output settings
output:
  format: txt
  verbose: false
