# TellDNS Stealth Mode Configuration

# Scan settings - slower but harder to detect
concurrency: 200
timeout: 5.0
stealth: true

# DNS resolvers (more variety)
resolvers:
  - 8.8.8.8
  - 1.1.1.1
  - 9.9.9.9
  - 208.67.222.222
  - 94.140.14.14
  - 76.76.19.19
  - 185.228.168.9

# Passive sources (all enabled)
passive_sources:
  crtsh: true
  alienvault: true
  rapiddns: true
  wayback: true
  dnsdumpster: true

# Output settings
output:
  format: json
  verbose: false
